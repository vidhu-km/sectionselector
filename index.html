<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Selection/Export – ooipsectiongrid only (Lasso + Toggle)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; font-family:sans-serif; }
    #map { width:100%; height:100%; }

    #panel {
      position:absolute;
      top:10px; left:10px;
      width:340px;
      max-height:82vh;
      overflow:auto;
      background:#fff;
      border-radius:8px;
      box-shadow:0 2px 14px rgba(0,0,0,0.2);
      padding:12px;
      font-size:12px;
      z-index:1000;
    }

    .header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .title { font-weight:700; font-size:13px; }

    .badge {
      font-size:11px;
      padding:3px 8px;
      border-radius:999px;
      background:#eef2ff;
      color:#334;
      border:1px solid #d7ddff;
      white-space:nowrap;
    }

    .btn {
      width:100%;
      padding:9px 10px;
      margin-bottom:8px;
      cursor:pointer;
      border:none;
      border-radius:6px;
      background:#3388ff;
      color:#fff;
      font-weight:600;
    }
    .btn.secondary { background:#8a8a8a; }

    .btn:disabled {
      background:#b7c9f7;
      cursor:not-allowed;
    }

    table { width:100%; border-collapse:collapse; font-size:11px; }
    th, td { border:1px solid #ddd; padding:4px; text-align:left; vertical-align:top; }
    th { background:#f4f4f4; }

    #status {
      font-size:11px;
      color:#444;
      margin-top:6px;
      line-height:1.3;
    }

    .hint {
      background:#f7f7f7;
      border:1px solid #e5e5e5;
      border-radius:6px;
      padding:8px;
      margin:8px 0 10px 0;
      line-height:1.35;
      color:#333;
    }

    .key {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-size: 11px;
      background:#fff;
      padding:2px 6px;
      border-radius:6px;
      border:1px solid #ddd;
    }

    /* New: per-column copy button styling inside headers */
    .copyBtn {
      margin-left:6px;
      padding:2px 6px;
      font-size:11px;
      border:1px solid #bbb;
      border-radius:4px;
      background:#f7f7f7;
      cursor:pointer;
    }
    .copyBtn:hover {
      background:#eee;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="panel">
    <div class="header">
      <div class="title">Selection Export</div>
      <div class="badge" id="countBadge">0 selected</div>
    </div>

    <div class="hint">
      <div><span class="key">Lasso</span>: drag on the map</div>
      <div><span class="key">Click</span>: add/remove that polygon</div>
      <div><b>Behavior:</b> any click/lasso on a polygon <span class="key">toggles</span> it:
        <span class="key">selected → unselected</span>, <span class="key">not selected → selected</span>.</div>
      <div style="margin-top:6px;"><b>Only</b> <span class="key">ooipsectiongrid</span> is selectable.</div>
    </div>

    <button id="exportBtn" class="btn" disabled>Export CSV</button>
    <button id="clearBtn" class="btn secondary">Clear Selection</button>

    <div id="status">No selection</div>
    <div id="tableContainer" style="margin-top:10px;">No selection</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

  <script>
    const shapefileUrls = [
      "data/ooipsectiongrid.zip",
      "data/Bakken Units.zip",
      "data/Handsworth Units.zip",
    ];

    const selectableUrl = "data/ooipsectiongrid.zip";

    const map = L.map('map').setView([51.05, -114.07], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Put selectable layer on top
    map.createPane('selectPane');
    map.getPane('selectPane').style.zIndex = 650;

    // selected: id -> { feature, layer }
    let selected = new Map();

    // gridIndex: id -> { layer, feature, turfFeature }
    let gridIndex = new Map();

    const styles = {
      default:   { color: "#3388ff", weight: 1, fillOpacity: 0.20 },
      hover:     { color: "#1d6fe6", weight: 2, fillOpacity: 0.45 },
      selected:  { color: "#0b3d91", weight: 2, fillOpacity: 0.65 }
    };

    const getId = (feature) => {
      if (feature?.id != null) return String(feature.id);
      const p = feature?.properties || {};
      const candidates = ["id", "ID", "OBJECTID", "FID", "Fid", "grid_id", "section_id", "name"];
      for (const k of candidates) if (p[k] != null) return String(p[k]);
      return JSON.stringify(p);
    };

    const truncate = (s, n = 160) => {
      s = (s == null) ? "" : String(s);
      return s.length > n ? s.slice(0, n) + "…" : s;
    };

    function makeTooltipContent(props) {
      const p = props || {};
      const entries = Object.entries(p);
      const max = 8;

      const items = entries.slice(0, max).map(([k, v]) => `
        <div><b>${k}</b>: ${truncate(v, 120)}</div>
      `).join("");

      const more = entries.length > max ? `<div><i>+ ${entries.length - max} more…</i></div>` : "";
      return `<div>${items}${more}</div>`;
    }

    function saveSelection() {
      const payload = [...selected.values()].map(x => x.feature);
      localStorage.setItem("selectedFeatures", JSON.stringify(payload));
    }

    function loadSelection() {
      const data = localStorage.getItem("selectedFeatures");
      if (!data) return;

      try {
        const list = JSON.parse(data);
        for (const f of list) {
          const id = getId(f);
          selected.set(id, { feature: f, layer: null });
        }
      } catch (e) {
        console.warn("Failed to parse saved selection:", e);
      }
    }

    function applySelectionStyle(layer, isSelected) {
      if (!layer) return;
      layer.setStyle(isSelected ? styles.selected : styles.default);
    }

    function updateUI() {
      const count = selected.size;
      document.getElementById("countBadge").textContent = `${count} selected`;

      const exportBtn = document.getElementById("exportBtn");
      exportBtn.disabled = count === 0;

      const status = document.getElementById("status");
      if (count === 0) {
        status.textContent = "No selection";
        document.getElementById("tableContainer").textContent = "No selection";
        return;
      }

      status.textContent = `Selected ${count} polygon${count === 1 ? "" : "s"} from ooipsectiongrid.`;

      const features = [...selected.values()].map(x => x.feature).filter(Boolean);
      const props0 = features[0]?.properties || {};
      const keys = Object.keys(props0);

      if (!features.length || keys.length === 0) {
        document.getElementById("tableContainer").textContent = "No selection";
        return;
      }

      // Build header with per-column copy buttons
      let html = "<table><thead><tr>";
      html += keys.map(k => `<th>${k} <button class="copyBtn" data-key="${k}" title="Copy column">${"Copy"}</button></th>`).join("");
      html += "</tr></thead><tbody>";

      html += features.map(f => {
        const props = f.properties || {};
        return `<tr>${keys.map(k => `<td>${props[k] ?? ""}</td>`).join("")}</tr>`;
      }).join("");

      html += "</tbody></table>";
      document.getElementById("tableContainer").innerHTML = html;
    }

    function copyColumnToClipboard(key) {
      // Copy values for the currently selected features for the given key as a single-column CSV
      const items = [...selected.values()].map(x => x.feature);
      const header = key;
      const rows = items.map(f => (f.properties?.[key] ?? ""));
      const csv = [header, ...rows].join("\n");

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(csv).catch((e) => {
          // Fallback if clipboard API is blocked
          fallbackCopy(csv);
        });
      } else {
        fallbackCopy(csv);
      }

      function fallbackCopy(text) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try { document.execCommand("copy"); } catch {}
        document.body.removeChild(ta);
      }
    }

    // Global event delegation for copy buttons (works with dynamic table)
    document.addEventListener('click', (e) => {
      const t = e.target;
      if (t && t.classList && t.classList.contains('copyBtn')) {
        const key = t.getAttribute('data-key');
        if (key) {
          copyColumnToClipboard(key);
        }
      }
    });

    function downloadCSV() {
      if (selected.size === 0) return;

      const features = [...selected.values()].map(x => x.feature);
      const keys = Object.keys(features[0]?.properties || {});
      if (keys.length === 0) return alert("Selected features have no properties to export.");

      const escapeCell = (v) => {
        const s = (v == null) ? "" : String(v);
        return `"${s.replace(/"/g, '""')}"`;
      };

      const rows = [
        keys.join(","),
        ...features.map(f => keys.map(k => escapeCell(f.properties?.[k])).join(","))
      ];

      const blob = new Blob([rows.join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "ooipsectiongrid_selected_polygons.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearSelection() {
      for (const id of [...selected.keys()]) {
        const item = selected.get(id);
        if (item?.layer) applySelectionStyle(item.layer, false);
      }
      selected.clear();
      localStorage.removeItem("selectedFeatures");
      updateUI();
    }

    function syncSavedSelectionStyles() {
      for (const [id, item] of selected.entries()) {
        const grid = gridIndex.get(id);
        if (grid) {
          item.layer = grid.layer;
          applySelectionStyle(grid.layer, true);
        } else {
          selected.delete(id);
        }
      }
    }

    // ---- TOGGLE SELECTION (click and marker-draw both toggle) ----
    function toggleId(id) {
      const entry = gridIndex.get(id);
      if (!entry) return;

      if (selected.has(id)) {
        // unselect
        const item = selected.get(id);
        if (item?.layer) applySelectionStyle(item.layer, false);
        selected.delete(id);
        return true;
      } else {
        // select
        selected.set(id, { feature: entry.feature, layer: entry.layer });
        applySelectionStyle(entry.layer, true);
        return true;
      }
    }

    function toggleIds(ids) {
      // foolproof: no duplicates
      const uniq = Array.from(new Set(ids));
      let changed = false;

      for (const id of uniq) {
        if (toggleId(id)) changed = true;
      }

      if (changed) {
        saveSelection();
        updateUI();
      }
    }

    // Load saved selection first
    loadSelection();

    function loadShapefile(url) {
      return shp(url).then((geojson) => {
        const isGrid = url === selectableUrl;

        return L.geoJSON(geojson, {
          pane: isGrid ? "selectPane" : undefined,
          style: styles.default,
          onEachFeature: (feature, layer) => {
            const id = getId(feature);

            if (!isGrid) {
              // Display-only: no selection, no tooltip, no interactivity
              layer.off();
              return;
            }

            // Selectable ooipsectiongrid
            gridIndex.set(id, { layer, feature, turfFeature: null });

            // Restore saved selection immediately (styles)
            if (selected.has(id)) applySelectionStyle(layer, true);

            // Tooltips with attributes
            layer.bindTooltip(makeTooltipContent(feature?.properties), {
              sticky: true,
              direction: "auto",
              opacity: 0.95
            });

            layer.on({
              mouseover() {
                if (!selected.has(id)) layer.setStyle(styles.hover);
              },
              mouseout() {
                if (!selected.has(id)) layer.setStyle(styles.default);
              },
              click(e) {
                // If a marker-draw is active, ignore click toggles to avoid conflicts
                if (markerState.active) return;
                toggleIds([id]); // click toggles
              }
            });
          }
        });
      });
    }

    // Load others first, grid last (top)
    const otherUrls = shapefileUrls.filter(u => u !== selectableUrl);
    const gridUrls = shapefileUrls.filter(u => u === selectableUrl);

    Promise.all(otherUrls.map(loadShapefile))
      .then((otherLayers) => {
        L.featureGroup(otherLayers).addTo(map);
        return Promise.all(gridUrls.map(loadShapefile));
      })
      .then((gridLayers) => {
        L.featureGroup(gridLayers).addTo(map);

        // Fit bounds across everything loaded
        let bounds = null;
        map.eachLayer(layer => {
          if (typeof layer.getBounds === "function") {
            const b = layer.getBounds();
            if (b && b.isValid()) {
              bounds = bounds ? bounds.extend(b) : b;
            }
          }
        });
        if (bounds) map.fitBounds(bounds, { padding: [20, 20] });

        // Precompute turf polygons for ooipsectiongrid only
        for (const [id, entry] of gridIndex.entries()) {
          try {
            gridIndex.set(id, {
              ...entry,
              turfFeature: turf.feature(entry.feature.geometry, entry.feature.properties)
            });
          } catch (e) {
            console.warn("Turf feature build failed for", id, e);
          }
        }

        syncSavedSelectionStyles();
        updateUI();
      })
      .catch((err) => {
        console.error("Failed to load one or more shapefiles:", err);
        alert("Error loading shapefiles – see console for details.");
      });

    // ---------------- MARKER DRAG SELECTION ----------------
    const markerState = {
      active: false,
      points: [],
      polyline: null,
      toggledThisDrag: new Set()
    };

    function startMarkerDraw(e) {
      if (e.originalEvent?.button !== 0) return; // left-click only

      // Don't start drawing when interacting with the panel
      if (e.originalEvent?.target?.closest?.("#panel")) return;

      markerState.active = true;
      markerState.points = [e.latlng];
      markerState.toggledThisDrag.clear();

      map.dragging.disable();

      if (markerState.polyline) {
        map.removeLayer(markerState.polyline);
        markerState.polyline = null;
      }

      markerState.polyline = L.polyline(markerState.points, {
        color: "#ff3b3b",
        weight: 2,
        opacity: 0.9,
        dashArray: "6 6"
      }).addTo(map);
    }

    function moveMarkerDraw(e) {
      if (!markerState.active) return;
      const prev = markerState.points[markerState.points.length - 1];
      const curr = e.latlng;
      markerState.points.push(curr);
      if (markerState.polyline) markerState.polyline.setLatLngs(markerState.points);

      // Test the segment between prev and curr against all grid features
      if (prev) {
        const segment = turf.lineString([[prev.lng, prev.lat], [curr.lng, curr.lat]]);
        for (const [id, entry] of gridIndex.entries()) {
          const t = entry.turfFeature;
          if (!t) continue;
          try {
            const intersects = turf.booleanIntersects(t, segment) ||
                               turf.booleanContains(t, segment) ||
                               turf.booleanContains(segment, t);
            if (intersects && !markerState.toggledThisDrag.has(id)) {
              toggleId(id);
              markerState.toggledThisDrag.add(id);
            }
          } catch {
            // ignore failures
          }
        }
      }
    }

    function finishMarkerDraw() {
      if (!markerState.active) return;
      markerState.active = false;

      map.dragging.enable();

      if (markerState.polyline) {
        map.removeLayer(markerState.polyline);
        markerState.polyline = null;
      }

      markerState.points = [];
      markerState.toggledThisDrag.clear();
    }

    map.on('mousedown', startMarkerDraw);
    map.on('mousemove', moveMarkerDraw);
    map.on('mouseup', finishMarkerDraw);
    map.on('mouseout', () => {
      if (markerState.active) finishMarkerDraw();
    });

    // UI events
    document.getElementById("exportBtn").onclick = downloadCSV;
    document.getElementById("clearBtn").onclick = clearSelection;

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (markerState.active) {
          finishMarkerDraw();
          return;
        }
        clearSelection();
      }
    });
  </script>
</body>
</html>
