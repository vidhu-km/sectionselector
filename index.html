<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Section Selection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body { margin:0; height:100%; font-family:sans-serif; }
    #map { width:100%; height:100%; }

    #panel {
      position:absolute;
      top:10px; left:10px;
      width:340px;
      max-height:82vh;
      overflow:auto;
      background:#fff;
      border-radius:8px;
      padding:12px;
      font-size:12px;
      z-index:1000;
    }

    .header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }
    .title { font-weight:700; font-size:13px; }

    .badge {
      font-size:11px;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid #ccc;
      white-space:nowrap;
    }

    .btn {
      width:100%;
      padding:9px 10px;
      margin-bottom:8px;
      cursor:pointer;
      border:none;
      border-radius:6px;
      background:#eee;
      color:#000;
      font-weight:600;
    }
    .btn.secondary { background:#ddd; }
    .btn:disabled { background:#e0e0e0; cursor:not-allowed; }

    table { width:100%; border-collapse:collapse; font-size:11px; }
    th, td { border:1px solid #ddd; padding:4px; text-align:left; vertical-align:top; }
    th { background:#f4f4f4; }

    #status { font-size:11px; color:#444; margin-top:6px; line-height:1.3; }

    .hint {
      background:#f7f7f7;
      border:1px solid #e5e5e5;
      border-radius:6px;
      padding:8px;
      margin:8px 0 10px 0;
      line-height:1.35;
      color:#333;
    }

    .key {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-size: 11px;
      background:#fff;
      padding:2px 6px;
      border-radius:6px;
      border:1px solid #ddd;
    }

    .copyBtn {
      margin-left:6px;
      padding:2px 6px;
      font-size:11px;
      border:1px solid #bbb;
      border-radius:4px;
      background:#f7f7f7;
      cursor:pointer;
    }
    .copyBtn:hover { background:#eee; }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="panel">
    <div class="header">
      <div class="title">Selection Export</div>
      <div class="badge" id="countBadge">0 selected</div>
    </div>

    <div class="hint">
      <div><span class="key">Multi-Select</span>: Hold shift and drag on the map</div>
      <div><span class="key">Single Select</span>: Left Click</div>
    </div>

    <button id="exportBtn" class="btn" disabled>Export CSV</button>
    <button id="clearBtn" class="btn secondary">Clear Selection</button>

    <!-- Start with a list -->
    <div style="margin-top:10px;">
      <div style="font-weight:700; font-size:13px; margin-bottom:6px;">Start with a list</div>

      <textarea id="startListInput"
                style="width:100%; height:90px; resize:vertical; font-size:12px; padding:8px;"
                placeholder="Paste Section IDs here (one per line, or comma/space separated)">
      </textarea>

      <button id="startWithListBtn" class="btn secondary" style="margin-top:8px; margin-bottom:0;">
        Apply list
      </button>

      <div id="startListStatus" style="margin-top:6px; font-size:11px; color:#444; line-height:1.3;">
        Paste Sections, then click “Apply list”.
      </div>
    </div>

    <div id="status">No selection</div>
    <div id="tableContainer" style="margin-top:10px;">No selection</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

  <script>
    // =========================
    // Config / Globals
    // =========================
    const shapefileUrls = [
      "data/ooipsectiongrid.zip",
      "data/Bakken Units.zip",
      "data/Handsworth Units.zip",
      "data/lines.zip",
      "data/sw.zip",
      "data/T1.zip",
      "data/T2.zip",
    ];
    const selectableUrl = "data/ooipsectiongrid.zip";

    // IMPORTANT: export + table should use the exact attribute name "Section"
    const SECTION_PROP = "Section";

    const map = L.map('map', { boxZoom: false }).setView([51.05, -114.07], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    map.createPane('selectPane');
    map.getPane('selectPane').style.zIndex = 650;

    const GRID_UNSELECTED_STYLE = { fillOpacity: 0, opacity: 0, color: '#555', weight: 1 };
    const GRID_SELECTED_STYLE   = { fillOpacity: 0.4, opacity: 0.4, color: '#0000ff', weight: 1 };

    // id -> { feature, layer, baseStyle, isGrid, turfFeature }
    const gridIndex = new Map();
    // id -> { feature, layer, baseStyle, isGrid }
    const selected = new Map();

    const $countBadge = document.getElementById("countBadge");
    const $exportBtn = document.getElementById("exportBtn");
    const $clearBtn = document.getElementById("clearBtn");
    const $status = document.getElementById("status");
    const $tableContainer = document.getElementById("tableContainer");

    // Start-with-list UI
    const $startListInput = document.getElementById("startListInput");
    const $startWithListBtn = document.getElementById("startWithListBtn");
    const $startListStatus = document.getElementById("startListStatus");

    // =========================
    // Single-tooltip (hover-only)
    // =========================
    let hoverTooltip = null;

    function ensureHoverTooltip() {
      if (hoverTooltip) return;

      hoverTooltip = L.tooltip({
        direction: "auto",
        opacity: 0.95,
        sticky: false
      });
    }

    function showHoverTooltipForLayer(layer, html) {
      ensureHoverTooltip();

      const center = layer.getBounds?.().getCenter?.();
      const latlng = center || (layer.getLatLng ? layer.getLatLng() : null);

      hoverTooltip
        .setContent(html || "")
        .setLatLng(latlng);

      if (!hoverTooltip._map) hoverTooltip.addTo(map);
      else hoverTooltip.update();
    }

    function hideHoverTooltip() {
      if (!hoverTooltip) return;
      hoverTooltip.remove();
    }

    map.on("mouseout", () => hideHoverTooltip());

    // =========================
    // Helpers
    // =========================
    function truncate(s, n = 160) {
      s = (s == null) ? "" : String(s);
      return s.length > n ? s.slice(0, n) + "…" : s;
    }

    function getId(feature) {
      if (feature?.id != null) return String(feature.id);

      const p = feature?.properties || {};
      const candidates = ["Section"];
      for (const k of candidates) if (p[k] != null) return String(p[k]);

      return JSON.stringify(p);
    }

    function getBaseStyleByUrl(url) {
      switch (url) {
        case "data/Bakken Units.zip":
        case "data/Handsworth Units.zip":
          return { weight: 3, color: '#555', fillOpacity: 0, opacity: 1 };

        case "data/lines.zip":
          return { color: '#808080', weight: 2, opacity: 1, fillOpacity: 0 };

        case "data/sw.zip":
          return { color: '#1f6bd8', fillColor: '#1f6bd8', fillOpacity: 0.4, opacity: 1 };

        case "data/T1.zip":
          return { color: '#2ecc71', fillColor: '#2ecc71', fillOpacity: 0.4, opacity: 1 };

        case "data/T2.zip":
          return { color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.4, opacity: 1 };

        case selectableUrl:
          return GRID_UNSELECTED_STYLE;

        default:
          return { weight: 1, fillOpacity: 0.2, opacity: 1, color: '#333' };
      }
    }

    function makeTooltipContent(props) {
      const p = props || {};
      const entries = Object.entries(p);
      const max = 8;

      const items = entries.slice(0, max).map(([k, v]) => `
        <div><b>${k}</b>: ${truncate(v, 120)}</div>
      `).join("");

      const more = entries.length > max
        ? `<div><i>+ ${entries.length - max} more…</i></div>`
        : "";

      return `<div>${items}${more}</div>`;
    }

    function applySelectionStyle(layer, isSelected, baseStyle, isGrid) {
      if (!layer) return;
      if (isSelected && isGrid) layer.setStyle(GRID_SELECTED_STYLE);
      else layer.setStyle(baseStyle);
    }

    function getSelectedFeatures() {
      return [...selected.values()].map(x => x.feature).filter(Boolean);
    }

    // =========================
    // Persist selection
    // =========================
    function saveSelection() {
      const payload = getSelectedFeatures();
      localStorage.setItem("selectedFeatures", JSON.stringify(payload));
    }

    function loadSelection() {
      const data = localStorage.getItem("selectedFeatures");
      if (!data) return;

      try {
        const list = JSON.parse(data);
        for (const f of list) {
          const id = getId(f);
          selected.set(id, { feature: f, layer: null, baseStyle: null, isGrid: true });
        }
      } catch (e) {
        console.warn("Failed to parse saved selection:", e);
      }
    }

    function syncSavedSelectionStyles() {
      for (const [id] of selected.entries()) {
        const grid = gridIndex.get(id);
        if (!grid) { selected.delete(id); continue; }

        const item = selected.get(id);
        item.layer = grid.layer;
        item.baseStyle = grid.baseStyle;
        item.isGrid = grid.isGrid;

        applySelectionStyle(grid.layer, true, grid.baseStyle, grid.isGrid);
      }
    }

    // =========================
    // Selection toggling
    // =========================
    function toggleId(id) {
      const entry = gridIndex.get(id);
      if (!entry) return false;

      if (selected.has(id)) {
        const item = selected.get(id);
        applySelectionStyle(item.layer, false, entry.baseStyle, entry.isGrid);
        selected.delete(id);
        return true;
      } else {
        selected.set(id, { feature: entry.feature, layer: entry.layer, baseStyle: entry.baseStyle, isGrid: entry.isGrid });
        applySelectionStyle(entry.layer, true, entry.baseStyle, entry.isGrid);
        return true;
      }
    }

    function toggleIds(ids) {
      let changed = false;
      const uniq = Array.from(new Set(ids));
      for (const id of uniq) changed = toggleId(id) || changed;

      if (changed) {
        saveSelection();
        updateUI();
      }
    }

    function clearSelection() {
      for (const [id, item] of selected.entries()) {
        const grid = gridIndex.get(id);
        if (grid?.layer) applySelectionStyle(grid.layer, false, grid.baseStyle, grid.isGrid);
      }
      selected.clear();
      localStorage.removeItem("selectedFeatures");
      updateUI();
    }

    // =========================
    // Start-with-list feature
    // =========================
    let pendingStartList = null;

    function parseIdList(text) {
      const raw = (text ?? "")
        .split(/[\n,]+/g)
        .flatMap(s => s.split(/\s+/g))
        .map(s => String(s).trim())
        .filter(Boolean);

      const seen = new Set();
      const out = [];
      for (const id of raw) {
        if (seen.has(id)) continue;
        seen.add(id);
        out.push(id);
      }
      return out;
    }

    function applyStartList(ids, { replace = true } = {}) {
      if (!Array.isArray(ids) || ids.length === 0) return { applied: 0, missing: 0 };

      if (replace) clearSelection();

      let applied = 0;
      let missing = 0;

      for (const id of ids) {
        if (!gridIndex.has(id)) {
          missing++;
          continue;
        }
        if (!selected.has(id)) {
          toggleId(id);
          applied++;
        }
      }

      saveSelection();
      updateUI();

      return { applied, missing };
    }

    function queueOrApplyStartList(ids) {
      if (!ids || ids.length === 0) return;

      if (gridIndex.size === 0) {
        pendingStartList = ids;
        if ($startListStatus) {
          $startListStatus.textContent = "Grid not loaded yet. Will apply your list when ready…";
        }
        return;
      }

      const res = applyStartList(ids, { replace: true });
      if ($startListStatus) {
        $startListStatus.textContent =
          `Applied ${res.applied} IDs. ${res.missing} ID(s) not found in the grid.`;
      }
    }

    // =========================
    // UI (ONLY "Section")
    // =========================
    function updateUI() {
      const count = selected.size;

      $countBadge.textContent = `${count} selected`;
      $exportBtn.disabled = (count === 0);

      if (count === 0) {
        $status.textContent = "No selection";
        $tableContainer.textContent = "No selection";
        return;
      }

      $status.textContent = `Selected ${count} polygon${count === 1 ? "" : "s"} from ooipsectiongrid.`;

      const features = getSelectedFeatures();

      const header = `
        <th>${SECTION_PROP}
          <button class="copyBtn" data-key="${SECTION_PROP}" title="Copy column">Copy</button>
        </th>
      `;

      const rows = features.map(f => {
        const props = f.properties || {};
        return `<tr><td>${props[SECTION_PROP] ?? ""}</td></tr>`;
      }).join("");

      $tableContainer.innerHTML = `<table><thead><tr>${header}</tr></thead><tbody>${rows}</tbody></table>`;
    }

    async function copyColumnToClipboard(key) {
      const features = getSelectedFeatures();
      const header = key;
      const rows = features.map(f => (f.properties?.[key] ?? ""));
      const csv = [header, ...rows].join("\n");

      try {
        if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(csv);
        else throw new Error("Clipboard API unavailable");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = csv;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try { document.execCommand("copy"); } catch {}
        document.body.removeChild(ta);
      }
    }

    // =========================
    // Download CSV (ONLY "Section")
    // =========================
    function downloadCSV() {
      if (selected.size === 0) return;

      const features = getSelectedFeatures();
      if (!features.length) return;

      const escapeCell = (v) => {
        const s = (v == null) ? "" : String(v);
        return `"${s.replace(/"/g, '""')}"`;
      };

      const header = SECTION_PROP;
      const lines = [
        header,
        ...features.map(f => escapeCell(f.properties?.[SECTION_PROP]))
      ];

      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "ooipsectiongrid_selected_Section.csv";
      a.click();

      URL.revokeObjectURL(url);
    }

    // =========================
    // Shapefile loading
    // =========================
    function loadShapefile(url) {
      const baseStyle = getBaseStyleByUrl(url);

      return shp(url).then((geojson) => {
        const isGrid = url === selectableUrl;

        return L.geoJSON(geojson, {
          pane: isGrid ? "selectPane" : undefined,
          style: baseStyle,

          onEachFeature: (feature, layer) => {
            const id = getId(feature);

            if (!isGrid) {
              layer.off();

              if (url === "data/Bakken Units.zip" || url === "data/Handsworth Units.zip") {
                layer.setStyle({ weight: 3, fillOpacity: 0, color: '#555' });
              }
              return;
            }

            gridIndex.set(id, {
              layer,
              feature,
              turfFeature: null,
              baseStyle,
              isGrid: true
            });

            if (selected.has(id)) applySelectionStyle(layer, true, baseStyle, true);

            // no per-feature tooltip binding
            layer.off();

            layer.on("mouseover", () => {
              if (drawState.active) return;
              const html = makeTooltipContent(feature?.properties);
              showHoverTooltipForLayer(layer, html);
            });

            layer.on("mouseout", () => {
              hideHoverTooltip();
            });

            layer.on("click", () => {
              if (drawState.active) return;
              toggleIds([id]);
            });
          }
        });
      });
    }

    // =========================
    // Shift-drag selection
    // =========================
    const drawState = {
      active: false,
      points: [],
      polyline: null,
      toggledThisDrag: new Set()
    };

    function startDraw(e) {
      if (!e.originalEvent?.shiftKey) return;
      if (e.originalEvent?.button !== 0) return;

      if (e.originalEvent?.target?.closest?.("#panel")) return;

      drawState.active = true;
      drawState.points = [e.latlng];
      drawState.toggledThisDrag.clear();

      hideHoverTooltip();

      if (drawState.polyline) {
        map.removeLayer(drawState.polyline);
        drawState.polyline = null;
      }

      drawState.polyline = L.polyline(drawState.points, {
        color: "", weight: 2, opacity: 0.9, dashArray: "6 6"
      }).addTo(map);
    }

    function moveDraw(e) {
      if (!drawState.active) return;

      const prev = drawState.points[drawState.points.length - 1];
      const curr = e.latlng;

      drawState.points.push(curr);
      if (drawState.polyline) drawState.polyline.setLatLngs(drawState.points);

      if (!prev) return;

      const segment = turf.lineString(
        [[prev.lng, prev.lat], [curr.lng, curr.lat]]
      );

      for (const [id, entry] of gridIndex.entries()) {
        if (drawState.toggledThisDrag.has(id)) continue;

        const t = entry.turfFeature;
        if (!t) continue;

        try {
          const intersects =
            turf.booleanIntersects(t, segment) ||
            turf.booleanContains(t, segment) ||
            turf.booleanContains(segment, t);

          if (intersects) {
            toggleId(id);
            drawState.toggledThisDrag.add(id);
          }
        } catch {
          // ignore turf errors
        }
      }
    }

    function finishDraw() {
      if (!drawState.active) return;
      drawState.active = false;

      if (drawState.polyline) {
        map.removeLayer(drawState.polyline);
        drawState.polyline = null;
      }

      drawState.points = [];
      drawState.toggledThisDrag.clear();

      hideHoverTooltip();

      saveSelection();
      updateUI();
    }

    map.on("mousedown", startDraw);
    map.on("mousemove", moveDraw);
    map.on("mouseup", finishDraw);
    map.on("mouseout", finishDraw);

    // =========================
    // Events
    // =========================
    $exportBtn.onclick = downloadCSV;
    $clearBtn.onclick = clearSelection;

    $startWithListBtn.onclick = () => {
      const ids = parseIdList($startListInput.value);

      if (!ids.length) {
        $startListStatus.textContent = "No Sections detected. Paste something like: 30-008-08W2, 31-008-08W2";
        return;
      }
      queueOrApplyStartList(ids);
    };

    document.addEventListener("click", (e) => {
      const t = e.target;
      if (t?.classList?.contains("copyBtn")) {
        const key = t.getAttribute("data-key");
        if (key) copyColumnToClipboard(key);
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key !== "Escape") return;
      if (drawState.active) return finishDraw();
      clearSelection();
    });

    // =========================
    // Main load
    // =========================
    loadSelection();
    updateUI();

    const otherUrls = shapefileUrls.filter(u => u !== selectableUrl);
    const gridUrls = shapefileUrls.filter(u => u === selectableUrl);

    Promise.all(otherUrls.map(loadShapefile))
      .then((otherLayers) => {
        L.featureGroup(otherLayers).addTo(map);
        return Promise.all(gridUrls.map(loadShapefile));
      })
      .then((gridLayers) => {
        L.featureGroup(gridLayers).addTo(map);

        let bounds = null;
        map.eachLayer(layer => {
          if (typeof layer.getBounds === "function") {
            const b = layer.getBounds();
            if (b && b.isValid()) bounds = bounds ? bounds.extend(b) : b;
          }
        });
        if (bounds) map.fitBounds(bounds, { padding: [20, 20] });

        for (const [id, entry] of gridIndex.entries()) {
          try {
            entry.turfFeature = turf.feature(entry.feature.geometry, entry.feature.properties);
          } catch (err) {
            console.warn("Turf feature build failed for", id, err);
          }
        }

        syncSavedSelectionStyles();

        if (pendingStartList && pendingStartList.length) {
          applyStartList(pendingStartList, { replace: true });
          pendingStartList = null;
        } else {
          updateUI();
        }
      })
      .catch((err) => {
        console.error("Failed to load one or more shapefiles:", err);
        alert("Error loading shapefiles – see console for details.");
      });
  </script>
</body>
</html>
